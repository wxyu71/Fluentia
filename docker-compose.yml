services:
  fluentia:
    build: .
    ports:
      - "${FLUENTIA_BIND_HOST:-0.0.0.0}:8778:8080"
    environment:
      - PORT=8080
      # ── Security ──
      # PRIVATE_MODE=true requires SECRET_PATH to connect
      - PRIVATE_MODE=false
      - SECRET_PATH=
      # IP_WHITELIST=true restricts connections to ALLOWED_IPS
      - IP_WHITELIST=false
      - ALLOWED_IPS=
      # ── File Transfer ──
      # -1=disabled, 0=unlimited, N=max MB per file
      - MAX_FILE_MB=100
      # ── Session Timing ──
      # How long a session token remains reusable before a new session is required.
      - SESSION_MAX_AGE_DAYS=7
      # How many seconds after mobile disconnects before PC window re-appears (default 60)
      # Set longer if you frequently switch apps and want the session to stay quiet
      - MOBILE_EXPIRY_SECS=60
    restart: unless-stopped
