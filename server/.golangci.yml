version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - gofmt
    - goimports

  settings:
    govet:
      enable-all: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
