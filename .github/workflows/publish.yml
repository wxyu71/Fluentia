name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.6.0) — required for manual trigger'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # === Verify version consistency ===
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract and verify version consistency
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.version }}"
          else
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi

          PKG_VERSION=$(grep -oP '"version":\s*"\K[^"]+' mobile/package.json)
          TS_VERSION=$(grep -oP "PROTOCOL_VERSION = '\K[^']+" mobile/src/types.ts)
          GO_VERSION=$(grep -oP 'ProtocolVersion = "\K[^"]+' server/protocol.go)
          CSPROJ_VERSION=$(grep -oP '<Version>\K[^<]+' client/Fluentia/Fluentia.csproj)
          CS_VERSION=$(grep -oP 'ProtocolVersion\s+= "\K[^"]+' client/Fluentia/Models/Messages.cs)

          echo "Resolved version: $TAG_VERSION"
          echo "package.json=$PKG_VERSION types.ts=$TS_VERSION protocol.go=$GO_VERSION csproj=$CSPROJ_VERSION Messages.cs=$CS_VERSION"

          VERSIONS="$PKG_VERSION $TS_VERSION $GO_VERSION $CSPROJ_VERSION $CS_VERSION"
          for v in $VERSIONS; do
            if [ "$v" != "$TAG_VERSION" ]; then
              echo "::error::Version mismatch! Expected=$TAG_VERSION, found=$v"
              exit 1
            fi
          done

          echo "All versions consistent: $TAG_VERSION"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  # === Build all components ===
  build-mobile:
    needs: check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v5
        with:
          name: mobile-dist
          path: mobile/dist/

  build-server:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - run: |
          cd server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../fluentia-server-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o ../fluentia-server-linux-arm64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o ../fluentia-server-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o ../fluentia-server-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ../fluentia-server-windows-amd64.exe .
      - uses: actions/upload-artifact@v5
        with:
          name: server-binaries
          path: fluentia-server-*

  build-client:
    needs: check-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0'
      - run: dotnet publish client/Fluentia/Fluentia.csproj -c Release -r win-x64 --self-contained -o publish/win-x64/
      - run: Compress-Archive -Path publish/win-x64/* -DestinationPath fluentia-win-x64.zip
        shell: pwsh
      - run: dotnet tool install --global vpk
      - run: vpk pack --packId Fluentia --packVersion $env:VERSION --packDir publish/win-x64 --outputDir velopack-output -e Fluentia.exe --icon client/Fluentia/fluentia.ico
        shell: pwsh
      - name: Ensure releases.win.json exists for Velopack 1.2.0 GithubSource
        run: |
          # vpk pack generates both RELEASES (old) and releases.win.json (new).
          # Velopack 1.2.0's GitBase.GetReleaseFeed uses GetVeloReleaseIndexName
          # which looks for releases.win.json. Remove the old RELEASES to avoid
          # confusion and ensure only releases.win.json is uploaded.
          if (Test-Path velopack-output/releases.win.json) {
            Write-Host "releases.win.json already exists — removing legacy RELEASES"
            Remove-Item velopack-output/RELEASES -Force -ErrorAction SilentlyContinue
          } elseif (Test-Path velopack-output/RELEASES) {
            Write-Host "Only RELEASES found — renaming to releases.win.json"
            Rename-Item -Path velopack-output/RELEASES -NewName releases.win.json -Force
          } else {
            Write-Error "Neither RELEASES nor releases.win.json found in velopack-output/"
            exit 1
          }
          Write-Host "Final assets:"
          Get-ChildItem velopack-output/ | ForEach-Object { Write-Host "  $_" }
        shell: pwsh
      - uses: actions/upload-artifact@v5
        with:
          name: client-windows
          path: |
            fluentia-win-x64.zip
            velopack-output/**/*

  build-docker:
    needs: [check-version, build-mobile, build-server]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          name: mobile-dist
          path: server/static/
      - uses: actions/download-artifact@v5
        with:
          name: server-binaries
          path: server/
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wxyu71/fluentia:${{ env.VERSION }}
            ghcr.io/wxyu71/fluentia:latest

  # === Create GitHub Release ===
  release:
    needs: [check-version, build-mobile, build-server, build-client, build-docker]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Download Windows client
        uses: actions/download-artifact@v5
        with:
          name: client-windows
          path: artifacts/client-windows/
      - name: Download server binaries
        uses: actions/download-artifact@v5
        with:
          name: server-binaries
          path: artifacts/server-binaries/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fluentia v${{ env.VERSION }}
          body: |
            ## Fluentia v${{ env.VERSION }}

            ### Downloads
            - **Windows Installer** (`Fluentia-Setup.exe`): Recommended — supports auto-updates
            - **Windows Portable** (`fluentia-win-x64.zip`): Standalone, no install required
            - **Server binaries**: Pre-built Go binaries for Linux/macOS/Windows
            - **Docker**: `ghcr.io/wxyu71/fluentia:${{ env.VERSION }}`

            ### Docker Quick Start
            ```
            docker pull ghcr.io/wxyu71/fluentia:${{ env.VERSION }}
            docker run -p 8778:8080 ghcr.io/wxyu71/fluentia:${{ env.VERSION }}
            ```

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/v${{ env.VERSION }}) for details.
          files: |
            artifacts/client-windows/velopack-output/*Setup*.exe
            artifacts/client-windows/fluentia-win-x64.zip
            artifacts/client-windows/velopack-output/Fluentia-*-full.nupkg
            artifacts/client-windows/velopack-output/Fluentia-*-delta.nupkg
            artifacts/client-windows/velopack-output/releases.win.json
            artifacts/server-binaries/fluentia-server-linux-amd64
            artifacts/server-binaries/fluentia-server-linux-arm64
            artifacts/server-binaries/fluentia-server-darwin-amd64
            artifacts/server-binaries/fluentia-server-darwin-arm64
            artifacts/server-binaries/fluentia-server-windows-amd64.exe
          draft: false
          prerelease: false
