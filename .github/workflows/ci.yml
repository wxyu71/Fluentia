name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # === Stage 0: Detect Changes ===
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      mobile: ${{ steps.filter.outputs.mobile }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            mobile:
              - 'mobile/**'
            client:
              - 'client/**'

  # === Stage 0: Version Consistency ===
  check-version:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.mobile == 'true' || needs.changes.outputs.client == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Verify version consistency across all components
        run: |
          PKG=$(grep -oP '"version":\s*"\K[^"]+' mobile/package.json)
          TS=$(grep -oP "PROTOCOL_VERSION = '\K[^']+" mobile/src/types.ts)
          GO=$(grep -oP 'ProtocolVersion = "\K[^"]+' server/protocol.go)
          CS=$(grep -oP '<Version>\K[^<]+' client/Fluentia/Fluentia.csproj)
          MSG=$(grep -oP 'ProtocolVersion\s+= "\K[^"]+' client/Fluentia/Models/Messages.cs)

          echo "package.json=$PKG types.ts=$TS protocol.go=$GO csproj=$CS Messages.cs=$MSG"

          if [ "$PKG" != "$TS" ] || [ "$PKG" != "$GO" ] || [ "$PKG" != "$CS" ] || [ "$PKG" != "$MSG" ]; then
            echo "::error::Version mismatch detected! All components must have the same version."
            echo "Expected all to match package.json=$PKG"
            exit 1
          fi

          echo "Version consistent: $PKG"

      - name: Verify heartbeat timing invariants
        run: |
          # Extract mobile heartbeat constants
          M_INTERVAL=$(grep -oP 'HEARTBEAT_INTERVAL_MS\s*=\s*\K\d+' mobile/src/hooks/useWebSocket.ts)
          M_TIMEOUT=$(grep -oP 'HEARTBEAT_TIMEOUT_MS\s*=\s*\K\d+' mobile/src/hooks/useWebSocket.ts)

          echo "Mobile: interval=${M_INTERVAL}ms timeout=${M_TIMEOUT}ms"

          if [ "$M_TIMEOUT" -le "$M_INTERVAL" ]; then
            echo "::error::HEARTBEAT_TIMEOUT_MS ($M_TIMEOUT) must be > HEARTBEAT_INTERVAL_MS ($M_INTERVAL)"
            echo "This causes spurious disconnections. See v1.7.4 regression."
            exit 1
          fi

          # Timeout should be at least 2x interval to tolerate one missed pong
          MIN_TIMEOUT=$((M_INTERVAL * 2))
          if [ "$M_TIMEOUT" -lt "$MIN_TIMEOUT" ]; then
            echo "::error::HEARTBEAT_TIMEOUT_MS ($M_TIMEOUT) should be >= 2 * HEARTBEAT_INTERVAL_MS ($MIN_TIMEOUT)"
            exit 1
          fi

          echo "Heartbeat timing OK: timeout ($M_TIMEOUT) > 2 * interval ($MIN_TIMEOUT)"

  # === Stage 1: Lint ===
  lint-go:
    needs: [changes, check-version]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.server == 'true'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: server

  lint-mobile:
    needs: [changes, check-version]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.mobile == 'true'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/

  lint-client:
    needs: [changes, check-version]
    runs-on: windows-latest
    if: needs.changes.outputs.client == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0'
      - run: dotnet format client/Fluentia.sln --verify-no-changes --no-restore

  # === Stage 2: Test ===
  test-go:
    needs: [changes, lint-go]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && needs.changes.outputs.server == 'true' }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - run: go test -v -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: server/coverage.out

  test-mobile:
    needs: [changes, lint-mobile]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && needs.changes.outputs.mobile == 'true' }}
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx vitest run --coverage

  test-client:
    needs: [changes, lint-client]
    runs-on: windows-latest
    if: ${{ !cancelled() && !failure() && needs.changes.outputs.client == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0'
      - run: dotnet test client/Fluentia.sln --logger trx --collect:"XPlat Code Coverage"

  # === Stage 3: Build ===
  build-docker:
    needs: [changes, test-go, test-mobile]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && (needs.changes.outputs.server == 'true' || needs.changes.outputs.mobile == 'true') }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: fluentia:ci-${{ github.sha }}

  build-mobile:
    needs: [changes, test-mobile]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && needs.changes.outputs.mobile == 'true' }}
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: mobile-dist
          path: mobile/dist/

  build-client:
    needs: [changes, test-client]
    runs-on: windows-latest
    if: ${{ !cancelled() && !failure() && needs.changes.outputs.client == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0'
      - run: dotnet publish client/Fluentia/Fluentia.csproj -c Release -r win-x64 --self-contained -o publish/
      - uses: actions/upload-artifact@v7
        with:
          name: fluentia-win-x64
          path: publish/

  # === Stage 4: Security ===
  security:
    needs: [changes, test-go, test-mobile, test-client]
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ always() && (needs.changes.outputs.server == 'true' || needs.changes.outputs.mobile == 'true') }}
    steps:
      - uses: actions/checkout@v6
      - name: Audit Go dependencies
        if: needs.changes.outputs.server == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run govulncheck
        if: needs.changes.outputs.server == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: server
      - name: Audit npm dependencies
        if: needs.changes.outputs.mobile == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm audit --audit-level=moderate
        if: needs.changes.outputs.mobile == 'true'
        working-directory: mobile
