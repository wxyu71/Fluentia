name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # === Stage 0: Version Consistency ===
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version consistency across all components
        run: |
          PKG=$(grep -oP '"version":\s*"\K[^"]+' mobile/package.json)
          TS=$(grep -oP "PROTOCOL_VERSION = '\K[^']+" mobile/src/types.ts)
          GO=$(grep -oP 'ProtocolVersion = "\K[^"]+' server/protocol.go)
          CS=$(grep -oP '<Version>\K[^<]+' client/Fluentia/Fluentia.csproj)
          MSG=$(grep -oP 'ProtocolVersion\s+= "\K[^"]+' client/Fluentia/Models/Messages.cs)

          echo "package.json=$PKG types.ts=$TS protocol.go=$GO csproj=$CS Messages.cs=$MSG"

          if [ "$PKG" != "$TS" ] || [ "$PKG" != "$GO" ] || [ "$PKG" != "$CS" ] || [ "$PKG" != "$MSG" ]; then
            echo "::error::Version mismatch detected! All components must have the same version."
            echo "Expected all to match package.json=$PKG"
            exit 1
          fi
          echo "Version consistent: $PKG"

  # === Stage 1: Lint ===
  lint-go:
    needs: check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: server

  lint-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/

  lint-client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet format client/Fluentia.sln --verify-no-changes --no-restore

  # === Stage 2: Test ===
  test-go:
    needs: lint-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test -v -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out

  test-mobile:
    needs: lint-mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx vitest run --coverage

  test-client:
    needs: lint-client
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet test client/Fluentia.sln --logger trx --collect:"XPlat Code Coverage"

  # === Stage 3: Build ===
  build-docker:
    needs: [test-go, test-mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fluentia:ci-${{ github.sha }}

  build-mobile:
    needs: test-mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-dist
          path: mobile/dist/

  build-client:
    needs: test-client
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet publish client/Fluentia.sln -c Release -r win-x64 --self-contained -o publish/
      - uses: actions/upload-artifact@v4
        with:
          name: fluentia-win-x64
          path: publish/

  # === Stage 4: Security ===
  security:
    needs: [test-go, test-mobile, test-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
        working-directory: server
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm audit --audit-level=moderate
        working-directory: mobile
